name: Deploy to Azure

# Builds the React web app + NestJS API and deploys to Azure App Service (B1 Basic).
# The React bundle is served as static files by NestJS so a single app serves both.
#
# Required GitHub Actions secrets:
#   AZURE_WEBAPP_PUBLISH_PROFILE  - publish profile XML from the App Service
#   AZURE_WEBAPP_NAME             - the App Service name (e.g. lipcode-api)
#   DATABASE_URL                  - production Postgres URL (for prisma migrate deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22-lts"

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=apps/api

      - name: Build agent (@quri/agent)
        run: npm run build --workspace=packages/agent

      - name: Build web (React)
        run: npm run build --workspace=apps/web

      - name: Build api (NestJS)
        run: npm run build --workspace=apps/api

      - name: Apply database migrations
        if: ${{ env.DATABASE_URL != '' }}
        run: npm run prisma:deploy --workspace=apps/api

      # The API build copies the web bundle into dist/public (postbuild),
      # so staging just needs the API dist + manifests + Prisma schema/client.
      # @quri/agent is a workspace package (not on any registry), so it is
      # vendored as a local file: dependency to pull its runtime dep `zod`,
      # then materialized as a REAL directory inside node_modules. npm installs
      # file: deps as symlinks, which break when the bundle is zipped/extracted
      # on App Service — a real copy survives deployment intact.
      - name: Stage deployment artifact
        run: |
          mkdir -p deploy
          cp -r apps/api/dist deploy/dist
          cp -r apps/api/prisma deploy/prisma
          cp apps/api/package.json deploy/package.json
          cd deploy
          mkdir -p vendor/agent
          cp -r ../packages/agent/dist vendor/agent/dist
          cp ../packages/agent/package.json vendor/agent/package.json
          npm pkg set dependencies.@quri/agent=file:vendor/agent
          npm install --omit=dev --no-audit --no-fund
          # Replace the npm-created symlink with a real directory so @quri/agent
          # resolves at runtime after the deploy package is zipped/extracted.
          rm -rf node_modules/@quri/agent
          mkdir -p node_modules/@quri/agent
          cp -r vendor/agent/dist node_modules/@quri/agent/dist
          cp vendor/agent/package.json node_modules/@quri/agent/package.json
          # Generate the Prisma Client (incl. Linux engine) into the deploy bundle
          # so the runtime has a ready client without dev dependencies.
          npx --yes prisma@5 generate --schema=prisma/schema.prisma

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy

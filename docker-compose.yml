services:
  db:
    image: postgres:16-alpine
    container_name: quri-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quri
      POSTGRES_PASSWORD: quri
      POSTGRES_DB: quri
    ports:
      - "5432:5432"
    volumes:
      - quri-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quri -d quri"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quri-db-data:
